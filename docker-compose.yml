services:
  fursa-db:
    image: postgres:16
    container_name: fursa-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-fursa}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}
    volumes:
      - fursa-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fursa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Blue-green deployment : 2 instances backend identiques sur 8081 et 8082.
  # Nginx route en round-robin avec failover automatique.
  # Pendant un déploiement, on redémarre une instance à la fois → zero downtime.
  # =========================================================================

  fursa-backend:
    build: .
    container_name: fursa-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DB_URL=jdbc:postgresql://fursa-db:5432/${POSTGRES_DB:-fursa}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?required}
      - JWT_SECRET=${JWT_SECRET:?required_min_32_chars}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      fursa-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/api/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 360s  # Spring Boot 4 + JPA peut prendre 5-6 min à démarrer

  fursa-backend-2:
    build: .
    container_name: fursa-backend-2
    ports:
      - "8082:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DB_URL=jdbc:postgresql://fursa-db:5432/${POSTGRES_DB:-fursa}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?required}
      - JWT_SECRET=${JWT_SECRET:?required_min_32_chars}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      fursa-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/api/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 360s

volumes:
  fursa-db-data:
