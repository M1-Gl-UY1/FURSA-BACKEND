services:
  fursa-backend:
    build: .
    container_name: fursa-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/fursa
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
