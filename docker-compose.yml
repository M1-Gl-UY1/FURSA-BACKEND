services:
  postgres:
    image: postgres:15-alpine
    container_name: fursa-postgres
    environment:
      POSTGRES_DB: fursa_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fursa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fursa_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  spring-app:
    build: .
    container_name: fursa-spring-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fursa_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    networks:
      - fursa-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  fursa-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local