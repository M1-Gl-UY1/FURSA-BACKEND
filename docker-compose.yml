services:
  fursa-db:
    image: postgres:16
    container_name: fursa-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-fursa}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}
    volumes:
      - fursa-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fursa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fursa-backend:
    build: .
    container_name: fursa-backend
    ports:
      - "8081:8081"
    environment:
      # Profil Spring : mettre 'prod' pour activer application-prod.yaml
      # (ddl-auto=validate, show-sql=false, pas de DataSeeder, logs INFO).
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      # Datasource
      - DB_URL=jdbc:postgresql://fursa-db:5432/${POSTGRES_DB:-fursa}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?required}
      # JWT : OBLIGATOIRE, pas de defaut, au moins 32 caracteres.
      # Generer avec : openssl rand -base64 48
      - JWT_SECRET=${JWT_SECRET:?required_min_32_chars}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      # CORS : liste separee par virgules, pas d'etoile en prod.
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      fursa-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  fursa-db-data:
