# application.yml
spring:
  datasource:
    url: jdbc:postgresql://localhost:5439/fursa_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  application:
    name: fursa-backend

server:
  port: 8089
  error:
    include-message: always

logging:
  level:
    com.fursa: DEBUG
    org.springframework.web: INFO

blockchain:
  api:
    url: http://localhost:3000
  rpc:
    url: http://localhost:8545

jwt:
  secret: fursaSecretKey2024ForJWTTokenGenerationAndValidation
  expiration: 86400000