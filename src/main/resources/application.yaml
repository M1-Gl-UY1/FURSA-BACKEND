server:
  port: 8081

spring:
  application:
    name: fursa-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/fursa
    username: postgres
    password: scorp
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  security:
    enabled: false

app:
  secret-key: ${JWT_SECRET:dev-only-secret-change-me-in-prod-min-32-chars-long-for-hs256}
  expiration-time: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs