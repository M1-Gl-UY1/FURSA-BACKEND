server:
  port: 8081

spring:
  application:
    name: fursa-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fursa}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:scorp}
    driver-class-name: org.postgresql.Driver

app:
  secret-key: ${JWT_SECRET:dev-only-secret-change-me-in-prod-min-32-chars-long-for-hs256}
  # Access token court : 1h par defaut. Le client recoit un refresh token a la connexion.
  expiration-time: ${JWT_EXPIRATION_MS:3600000}
  # Refresh token long : 7 jours par defaut. Stocke en DB, revocable, rotation a chaque /auth/refresh.
  refresh-expiration-time: ${REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [requestId=%X{requestId:-}] %logger{36} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Blockchain (Web3j). Defauts = Hardhat local pour dev.
# En prod : tout passer via variables d'environnement, JAMAIS la cle privee en clair dans le repo.
# Chain ID : 1337 = Ganache, 31337 = Hardhat, 11155111 = Sepolia testnet, 137 = Polygon mainnet.
blockchain:
  rpc-url: ${BLOCKCHAIN_RPC_URL:http://127.0.0.1:8545}
  contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS:0x5b1869D9A4C187F2EAa108f3062412ecf0526b24}
  # Defaut = compte 0 Hardhat (cle publique connue, valable uniquement pour dev local).
  # En prod, surcharger via env var BLOCKCHAIN_OWNER_PRIVATE_KEY.
  owner-private-key: ${BLOCKCHAIN_OWNER_PRIVATE_KEY:0x4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d}
  gas-price: ${BLOCKCHAIN_GAS_PRICE:2000000000}
  gas-limit: ${BLOCKCHAIN_GAS_LIMIT:30000000}
  chain-id: ${BLOCKCHAIN_CHAIN_ID:31337}
