name: Deploy FURSA Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash -s" <<EOF
            set -e
            cd ~/Fursa/FURSA-BACKEND
            echo "=== Syncing to origin/main (discarding any local changes) ==="
            git fetch "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" main
            git reset --hard FETCH_HEAD
            git clean -fd
            echo "=== Building backend image ==="
            docker compose build fursa-backend
            echo "=== Restarting containers ==="
            docker compose up -d
            echo "=== Cleaning dangling images ==="
            docker image prune -f
            echo "=== Deployment status ==="
            docker ps --filter name=fursa --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF

      - name: Verify API is up
        run: |
          sleep 10
          curl -fsS --max-time 30 --retry 5 --retry-delay 10 \
            https://${{ secrets.VPS_HOST }}/api/marche-primaire/possessions
