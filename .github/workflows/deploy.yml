name: Deploy FURSA Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH (zero-downtime blue-green)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS (rolling restart of 2 backend instances)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BLOCKCHAIN_RPC_URL: ${{ secrets.BLOCKCHAIN_RPC_URL }}
          BLOCKCHAIN_CONTRACT_ADDRESS: ${{ secrets.BLOCKCHAIN_CONTRACT_ADDRESS }}
          BLOCKCHAIN_OWNER_PRIVATE_KEY: ${{ secrets.BLOCKCHAIN_OWNER_PRIVATE_KEY }}
          BLOCKCHAIN_CHAIN_ID: ${{ secrets.BLOCKCHAIN_CHAIN_ID }}
          BLOCKCHAIN_GAS_PRICE: ${{ secrets.BLOCKCHAIN_GAS_PRICE }}
          BLOCKCHAIN_GAS_LIMIT: ${{ secrets.BLOCKCHAIN_GAS_LIMIT }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash -s" <<EOF
            set -e
            cd ~/Fursa/FURSA-BACKEND

            echo "=== Syncing to origin/main ==="
            git fetch "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" main
            git reset --hard FETCH_HEAD
            git clean -fd

            echo "=== Syncing BLOCKCHAIN_* secrets dans .env (sans toucher au reste) ==="
            # Atomic update : on retire toutes les anciennes lignes BLOCKCHAIN_* puis on append les valeurs des secrets.
            # Les \${BLOCKCHAIN_*} sont substitues cote GH Actions runner avant l'envoi SSH.
            grep -v '^BLOCKCHAIN_' .env > .env.tmp 2>/dev/null || cp .env .env.tmp
            echo "BLOCKCHAIN_RPC_URL=${BLOCKCHAIN_RPC_URL}" >> .env.tmp
            echo "BLOCKCHAIN_CONTRACT_ADDRESS=${BLOCKCHAIN_CONTRACT_ADDRESS}" >> .env.tmp
            echo "BLOCKCHAIN_OWNER_PRIVATE_KEY=${BLOCKCHAIN_OWNER_PRIVATE_KEY}" >> .env.tmp
            echo "BLOCKCHAIN_CHAIN_ID=${BLOCKCHAIN_CHAIN_ID}" >> .env.tmp
            echo "BLOCKCHAIN_GAS_PRICE=${BLOCKCHAIN_GAS_PRICE}" >> .env.tmp
            echo "BLOCKCHAIN_GAS_LIMIT=${BLOCKCHAIN_GAS_LIMIT}" >> .env.tmp
            mv .env.tmp .env
            chmod 600 .env
            echo "Vars BLOCKCHAIN_* injectees (\$(grep -c '^BLOCKCHAIN_' .env) lignes)"

            echo "=== Applying DB migrations (idempotent) ==="
            # Copie le fichier SQL dans le conteneur Postgres puis l'execute
            docker cp scripts/migrations/001_idempotency_and_possession_unique.sql fursa-db:/tmp/migration.sql
            docker exec fursa-db psql -U postgres -d fursa -f /tmp/migration.sql
            echo "=== Migrations DB OK ==="

            echo "=== Building new backend image ==="
            docker compose build fursa-backend

            wait_healthy() {
              local container=\$1
              local max=\$2
              echo "Waiting for \$container to be healthy (max \${max}s)..."
              for i in \$(seq 1 \$((max / 5))); do
                status=\$(docker inspect --format '{{.State.Health.Status}}' "\$container" 2>/dev/null || echo "missing")
                if [ "\$status" = "healthy" ]; then
                  echo "\$container is healthy after \$((i * 5))s"
                  return 0
                fi
                sleep 5
              done
              echo "ERROR: \$container did not become healthy within \${max}s"
              docker compose logs --tail=50 "\$container"
              return 1
            }

            echo "=== Step 1/2 : recreate fursa-backend-2 (8082), nginx routera sur 8081 pendant ce temps ==="
            docker compose up -d --force-recreate --no-deps fursa-backend-2
            wait_healthy fursa-backend-2 600

            echo "=== Step 2/2 : recreate fursa-backend (8081), nginx routera sur 8082 pendant ce temps ==="
            docker compose up -d --force-recreate --no-deps fursa-backend
            wait_healthy fursa-backend 600

            echo "=== Cleaning dangling images ==="
            docker image prune -f

            echo "=== Final status ==="
            docker ps --filter name=fursa --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF

      - name: Verify API is up via public URL
        run: |
          # Health check final côté public : doit déjà être OK puisque le rolling
          # garantit qu'au moins une instance répond à tout moment.
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
              https://api.fursa.seed-innov.com/api/health || echo "000")
            if [ "$code" = "200" ]; then
              echo "API public is up (HTTP 200 after ${i} attempt(s))"
              exit 0
            fi
            echo "Attempt $i/12: HTTP $code, retrying in 5s..."
            sleep 5
          done
          echo "Public API did not become healthy within 1 minute"
          exit 1
