name: Deploy FURSA Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash -s" <<EOF
            set -e
            cd ~/Fursa/FURSA-BACKEND
            echo "=== Syncing to origin/main (discarding any local changes) ==="
            git fetch "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" main
            git reset --hard FETCH_HEAD
            git clean -fd
            echo "=== Building backend image ==="
            docker compose build fursa-backend
            echo "=== Restarting containers ==="
            docker compose up -d
            echo "=== Cleaning dangling images ==="
            docker image prune -f
            echo "=== Deployment status ==="
            docker ps --filter name=fursa --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF

      - name: Verify API is up
        run: |
          echo "Waiting for Spring Boot to finish starting..."
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
              https://${{ secrets.VPS_HOST }}/api/health || echo "000")
            if [ "$code" = "200" ]; then
              echo "API is up (HTTP 200 after ${i} attempt(s))"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $code, retrying in 10s..."
            sleep 10
          done
          echo "API did not become healthy within 5 minutes"
          exit 1
